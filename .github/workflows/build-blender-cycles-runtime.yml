name: Build Blender Cycles Runtime

on:
  push:
    paths:
      - ".github/workflows/build-blender-cycles-runtime.yml"
      - "blender-cycles-headless-rtx.cmake"
      - "trim_blender_runtime_tree.sh"
      - "README.md"
  workflow_dispatch:
    inputs:
      blender_version:
        description: Blender version tag without leading v
        required: false
        default: "5.1.1"
      release_tag:
        description: Release tag to publish
        required: false
        default: "blender-5.1.1-cycles-headless-rtx"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      BLENDER_VERSION: ${{ inputs.blender_version || '5.1.1' }}
      RELEASE_TAG: ${{ inputs.release_tag || 'blender-5.1.1-cycles-headless-rtx' }}
      PREVIOUS_TRIM2_BYTES: "250162556"
    steps:
      - name: Check out release repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git \
            git-lfs \
            ca-certificates \
            cmake \
            ninja-build \
            clang-18 \
            lld-18 \
            ripgrep \
            xz-utils

      - name: Clone Blender source
        run: |
          set -euxo pipefail
          export GIT_LFS_SKIP_SMUDGE=1
          git clone --depth 1 --branch "v${BLENDER_VERSION}" https://projects.blender.org/blender/blender.git blender-src
          cd blender-src
          git lfs install --local
          git lfs pull --include="release/datafiles/startup.blend" --exclude=""
          python3 build_files/utils/make_update.py --no-blender

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          set -euxo pipefail
          cmake -S blender-src -B build -G Ninja \
            -C "${GITHUB_WORKSPACE}/blender-cycles-headless-rtx.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${CC}" \
            -DCMAKE_CXX_COMPILER="${CXX}" \
            -DCMAKE_EXE_LINKER_FLAGS_INIT="-fuse-ld=lld" \
            -DCMAKE_SHARED_LINKER_FLAGS_INIT="-fuse-ld=lld"

      - name: Build and install
        run: |
          set -euxo pipefail
          cmake --build build --parallel "$(nproc)"
          cmake --build build --target install

      - name: Package runtime variants
        run: |
          set -euxo pipefail

          version="${BLENDER_VERSION}"
          stage_dir="blender-${version}-linux-x64"
          asset_prefix="blender-${version}-linux-x64-cycles-headless-rtx"
          base_root="dist/base/${stage_dir}"

          rm -rf dist
          mkdir -p "$base_root"
          cp -a build/bin/. "$base_root/"

          TRIM_PROFILE=farm-nvidia \
            "${GITHUB_WORKSPACE}/trim_blender_runtime_tree.sh" "$base_root"

          while IFS= read -r target; do
            llvm-strip-18 --strip-debug "$target" || true
          done < <(find "$base_root" -type f \( -name 'blender' -o -name '*.so' -o -name '*.so.*' \) | sort)

          package_variant() {
            local label="$1"
            local keep_arches="$2"
            local asset_base="$3"
            local work_root="dist/work/${label}/${stage_dir}"
            mkdir -p "$work_root"
            cp -a "$base_root/." "$work_root/"
            if [[ -n "$keep_arches" ]]; then
              TRIM_PROFILE=farm-nvidia \
              TRIM_KEEP_CUDA_ARCHES="$keep_arches" \
                "${GITHUB_WORKSPACE}/trim_blender_runtime_tree.sh" "$work_root"
            fi
            tar -cJf "dist/${asset_base}.tar.xz" -C "dist/work/${label}" "${stage_dir}"
            sha256sum "dist/${asset_base}.tar.xz" | tee "dist/${asset_base}.tar.xz.sha256"
            stat -c '%s' "dist/${asset_base}.tar.xz" | tee "dist/${asset_base}.tar.xz.bytes"
            du -sh "$work_root" | tee "dist/${asset_base}.tar.xz.du"
          }

          package_variant safe "" "${asset_prefix}-safe"
          cp "dist/${asset_prefix}-safe.tar.xz" "dist/${asset_prefix}.tar.xz"
          cp "dist/${asset_prefix}-safe.tar.xz.sha256" "dist/${asset_prefix}.tar.xz.sha256"
          cp "dist/${asset_prefix}-safe.tar.xz.bytes" "dist/${asset_prefix}.tar.xz.bytes"
          cp "dist/${asset_prefix}-safe.tar.xz.du" "dist/${asset_prefix}.tar.xz.du"

          package_variant sm75 "75" "${asset_prefix}-sm75"
          package_variant sm86 "86" "${asset_prefix}-sm86"
          package_variant sm89 "89" "${asset_prefix}-sm89"
          package_variant sm120 "120" "${asset_prefix}-sm120"

          ASSET_PREFIX="${asset_prefix}" python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          prefix = os.environ["ASSET_PREFIX"]
          dist = Path("dist")
          manifest = {}

          for asset in sorted(dist.glob(f"{prefix}*.tar.xz")):
              digest = hashlib.sha256(asset.read_bytes()).hexdigest()
              manifest[asset.name] = {
                  "sha256": digest,
                  "bytes": asset.stat().st_size,
              }

          (dist / "release-assets.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

          {
            echo "STAGE_DIR=${stage_dir}"
            echo "SAFE_ASSET_NAME=${asset_prefix}-safe.tar.xz"
          } >> "$GITHUB_ENV"

      - name: Smoke render
        run: |
          set -euxo pipefail
          mkdir -p smoke
          cat > smoke/smoke_render.py <<'PY'
          import bpy
          scene = bpy.context.scene
          scene.render.engine = "CYCLES"
          scene.cycles.device = "CPU"
          scene.cycles.samples = 4
          scene.render.resolution_x = 128
          scene.render.resolution_y = 128
          scene.render.filepath = "//smoke/out.png"
          bpy.ops.object.select_all(action="SELECT")
          bpy.ops.object.delete(use_global=False)
          bpy.ops.mesh.primitive_cube_add(location=(0.0, 0.0, 0.0))
          bpy.ops.object.light_add(type="SUN", location=(4.0, -4.0, 6.0))
          bpy.ops.object.camera_add(location=(4.0, -4.0, 3.0), rotation=(1.1, 0.0, 0.8))
          scene.camera = bpy.context.object
          bpy.ops.render.render(write_still=True)
          PY
          "./dist/base/${STAGE_DIR}/blender" --background --factory-startup --python smoke/smoke_render.py
          test -s smoke/out.png

      - name: Build summary
        run: |
          set -euxo pipefail
          python3 - <<'PY' | tee dist/build-summary.txt
          import pathlib
          import os

          asset_name = os.environ["SAFE_ASSET_NAME"]
          new_bytes = int(pathlib.Path(f"dist/{asset_name}.bytes").read_text().strip())
          old_bytes = int(os.environ["PREVIOUS_TRIM2_BYTES"])
          saved = old_bytes - new_bytes
          percent = (saved / old_bytes * 100.0) if old_bytes else 0.0
          print(f"Previous trim2 bytes: {old_bytes}")
          print(f"New source-build safe bytes: {new_bytes}")
          print(f"Delta bytes: {saved}")
          print(f"Delta percent: {percent:.3f}%")
          PY
          cat dist/build-summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blender-cycles-runtime-${{ env.BLENDER_VERSION }}
          path: |
            dist/**
            smoke/out.png

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Blender ${{ env.BLENDER_VERSION }} cycles headless RTX runtime
          overwrite_files: true
          files: |
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx.tar.xz
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx.tar.xz.sha256
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx.tar.xz.bytes
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx.tar.xz.du
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-safe.tar.xz
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-safe.tar.xz.sha256
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-safe.tar.xz.bytes
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-safe.tar.xz.du
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm75.tar.xz
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm75.tar.xz.sha256
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm75.tar.xz.bytes
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm75.tar.xz.du
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm86.tar.xz
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm86.tar.xz.sha256
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm86.tar.xz.bytes
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm86.tar.xz.du
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm89.tar.xz
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm89.tar.xz.sha256
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm89.tar.xz.bytes
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm89.tar.xz.du
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm120.tar.xz
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm120.tar.xz.sha256
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm120.tar.xz.bytes
            dist/blender-${{ env.BLENDER_VERSION }}-linux-x64-cycles-headless-rtx-sm120.tar.xz.du
            dist/release-assets.json
            dist/build-summary.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
